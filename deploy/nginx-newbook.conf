# Nginx site config for newbook.workarya.com
# Copy: sudo cp deploy/nginx-newbook.conf /etc/nginx/sites-available/newbook
# Enable: sudo ln -sf /etc/nginx/sites-available/newbook /etc/nginx/sites-enabled/
# Test:   sudo nginx -t
# Reload: sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name newbook.workarya.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name newbook.workarya.com;

    root /var/www/newbook/public;
    index index.php;

    # REQUIRED for story/post video uploads (default nginx limit is only 1MB)
    client_max_body_size 128M;

    # SSL — update paths to your certificate files
    # ssl_certificate     /etc/letsencrypt/live/newbook.workarya.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/newbook.workarya.com/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # PHP upload limits (must match public/.user.ini)
        fastcgi_read_timeout 600;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=110M \n max_execution_time=600 \n memory_limit=512M";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
